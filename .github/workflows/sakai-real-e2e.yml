name: Sakai Real E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL for CredTrail environment under test
        required: true
        default: https://credtrail.org
      tenant_id:
        description: Tenant ID for CredTrail LTI issuer registration
        required: true
      sakai_issuer:
        description: Sakai issuer URL (iss claim)
        required: true
      sakai_authorization_endpoint:
        description: Sakai OIDC authorization endpoint (for example /imsoidc/lti13/oidc_auth)
        required: true
      sakai_client_id:
        description: LTI client_id configured for CredTrail in Sakai
        required: true
      sakai_target_link_uri:
        description: Tool launch URL configured in Sakai (must match launch claim target_link_uri)
        required: true
      sakai_login_hint:
        description: Sakai login_hint path/value (often /access/lti/site/.../content:...)
        required: true
      sakai_deployment_id:
        description: Optional LTI deployment ID to pass in OIDC initiation
        required: false
        default: ''
      sakai_token_endpoint:
        description: Optional token endpoint used for NRPS (only if your Sakai setup supports configured flow)
        required: false
        default: ''
      require_deep_linking:
        description: Fail unless launch resolves to deep-link selection page
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      require_nrps:
        description: Fail unless NRPS bulk roster status is ready on launch page
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      expected_role:
        description: Expected launch role shown by CredTrail
        required: false
        default: any
        type: choice
        options:
          - any
          - instructor
          - learner
      sakai_username:
        description: Optional Sakai username for interactive login (if login page appears)
        required: false
        default: ''

jobs:
  sakai-real-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate required secret
        env:
          E2E_BOOTSTRAP_ADMIN_TOKEN: ${{ secrets.E2E_BOOTSTRAP_ADMIN_TOKEN }}
        run: |
          if [ -z "$E2E_BOOTSTRAP_ADMIN_TOKEN" ]; then
            echo "Missing repository secret: E2E_BOOTSTRAP_ADMIN_TOKEN"
            exit 1
          fi

      - name: Validate optional parameter combinations
        env:
          REQUIRE_NRPS: ${{ inputs.require_nrps }}
          SAKAI_TOKEN_ENDPOINT: ${{ inputs.sakai_token_endpoint }}
          SAKAI_USERNAME: ${{ inputs.sakai_username }}
          E2E_SAKAI_PASSWORD: ${{ secrets.E2E_SAKAI_PASSWORD }}
        run: |
          if [ "$REQUIRE_NRPS" = "true" ] && [ -z "$SAKAI_TOKEN_ENDPOINT" ]; then
            echo "Input sakai_token_endpoint is required when require_nrps=true"
            exit 1
          fi

          if [ -n "$SAKAI_USERNAME" ] && [ -z "$E2E_SAKAI_PASSWORD" ]; then
            echo "Repository secret E2E_SAKAI_PASSWORD is required when sakai_username is provided"
            exit 1
          fi

      - name: Run real Sakai e2e test
        env:
          E2E_BASE_URL: ${{ inputs.base_url }}
          E2E_REAL_SAKAI_ENABLED: 'true'
          E2E_BOOTSTRAP_ADMIN_TOKEN: ${{ secrets.E2E_BOOTSTRAP_ADMIN_TOKEN }}
          E2E_SAKAI_TENANT_ID: ${{ inputs.tenant_id }}
          E2E_SAKAI_ISSUER: ${{ inputs.sakai_issuer }}
          E2E_SAKAI_AUTHORIZATION_ENDPOINT: ${{ inputs.sakai_authorization_endpoint }}
          E2E_SAKAI_CLIENT_ID: ${{ inputs.sakai_client_id }}
          E2E_SAKAI_TARGET_LINK_URI: ${{ inputs.sakai_target_link_uri }}
          E2E_SAKAI_LOGIN_HINT: ${{ inputs.sakai_login_hint }}
          E2E_SAKAI_DEPLOYMENT_ID: ${{ inputs.sakai_deployment_id }}
          E2E_SAKAI_TOKEN_ENDPOINT: ${{ inputs.sakai_token_endpoint }}
          E2E_SAKAI_CLIENT_SECRET: ${{ secrets.E2E_SAKAI_CLIENT_SECRET }}
          E2E_SAKAI_USERNAME: ${{ inputs.sakai_username }}
          E2E_SAKAI_PASSWORD: ${{ secrets.E2E_SAKAI_PASSWORD }}
          E2E_SAKAI_REQUIRE_DEEP_LINKING: ${{ inputs.require_deep_linking }}
          E2E_SAKAI_REQUIRE_NRPS: ${{ inputs.require_nrps }}
          E2E_SAKAI_EXPECTED_ROLE: ${{ inputs.expected_role }}
        run: pnpm test:e2e:sakai-real --project=chromium

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sakai-real-e2e-playwright-artifacts
          path: artifacts/playwright
          if-no-files-found: ignore
